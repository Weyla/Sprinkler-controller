# Installation identity, LAN settings, location, and defaults are deliberately
# kept out of the public firmware file. Copy local.example.yaml to local.yaml.
substitutions: !include local.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32
  framework:
    type: arduino
    # ESPHome calculates 13 descriptors from the configured services, but that
    # exact-fit pool reproduced HTTP accept error 23 under short connection
    # bursts. Seven spare descriptors cost 424 bytes of static RAM in this
    # build and keep browser reconnects/imports from exhausting the pool.
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "20"

external_components:
  - source:
      type: local
      path: ../components
    components:
      - dtr0xx_io
      - dynamic_sprinkler
      # ESPHome 2026.6.5 performs only one socket read for form bodies. This
      # pinned local override completes fragmented reads before parsing.
      - web_server_idf

logger:
  # Keep serial crash/reset diagnostics available during development and first
  # installation. Remove or redirect this only when UART0 is physically used.
  baud_rate: 115200
  level: INFO

api:
  id: ha_api
  encryption:
    key: !secret api_key
  # Recover from a wedged native API without reacting to short HA outages.
  reboot_timeout: 0s

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # A controller that has lost its IP stack indefinitely is less safe than a
  # controlled reboot; the boot hook always turns every relay off.
  reboot_timeout: 15min
  # This controller serves an interactive local UI, so favor stable latency
  # and the strongest available AP over ESP32 power savings/fast association.
  power_save_mode: none
  fast_connect: false
  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway}
    subnet: ${subnet}
    dns1: ${dns1}
    dns2: ${dns2}

time:
  - platform: sntp
    id: sprinkler_time
    timezone: ${timezone}

sun:
  id: sprinkler_sun
  time_id: sprinkler_time
  latitude: ${latitude}
  longitude: ${longitude}

dtr0xx_io:
  - id: dtr0xx_io_hub
    # One shift register provides eight outputs. Increase this only when the
    # relay hardware has additional compatible registers physically chained.
    # Use 2 for up to 16 outputs, 3 for up to 24, or 4 for up to 32.
    sr_count: 1
    dingtian_clk_pin: 14
    dingtian_q7_pin: 16
    dingtian_sdi_pin: 13
    dingtian_pl_pin: 32
    dingtian_rck_pin: 15

# ZONE OUTPUTS
# Define one internal ESPHome switch for every valve. The scheduler accepts
# 1-32 zones and can use any switch platform; these examples use the Dingtian
# shift-register GPIO driver. Keep restore_mode ALWAYS_OFF and internal true.
#
# To add a zone:
# 1. Physically add a relay output and increase sr_count above if necessary.
# 2. Copy one switch block, give it a unique relay_N id and unused pin number.
# 3. Add the matching entry to dynamic_sprinkler.zones below.
#
# Schedules store the explicit stable zone_id values configured below. Entries
# may be reordered, but do not reuse an ID for different physical hardware
# while saved schedules or backups may still reference it.
switch:
  - platform: gpio
    id: relay_1
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 7, inverted: false}
  - platform: gpio
    id: relay_2
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 6, inverted: false}
  - platform: gpio
    id: relay_3
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 5, inverted: false}
  - platform: gpio
    id: relay_4
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 4, inverted: false}
  - platform: gpio
    id: relay_5
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 3, inverted: false}
  - platform: gpio
    id: relay_6
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 2, inverted: false}
  - platform: gpio
    id: relay_7
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 1, inverted: false}
  - platform: gpio
    id: relay_8
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 0, inverted: false}

dynamic_sprinkler:
  id: dynamic_scheduler
  time_id: sprinkler_time
  sun_id: sprinkler_sun
  # ZONE LIST
  # This is the only scheduler list to extend. Each entry binds a physical
  # switch and native Home Assistant quick-run button. Names default to Zone 1,
  # Zone 2, etc. Add `name: "Front Lawn"` only when a custom first-boot name is
  # useful; names remain editable and persistent in the web UI. The component
  # validates a minimum of 1 and maximum of 32 entries. `zone_id` defaults to
  # the list position. For an open-source or long-lived installation, set a
  # unique ID from 1-32 explicitly and never reuse it for different hardware;
  # schedules keep these IDs, so YAML entries can then be safely reordered.
  zones:
    - zone_id: 1
      relay: relay_1
      button: {id: zone_1_manual_button, name: "Zone 1 Manual Run"}
    - zone_id: 2
      relay: relay_2
      button: {id: zone_2_manual_button, name: "Zone 2 Manual Run"}
    - zone_id: 3
      relay: relay_3
      button: {id: zone_3_manual_button, name: "Zone 3 Manual Run"}
    - zone_id: 4
      relay: relay_4
      button: {id: zone_4_manual_button, name: "Zone 4 Manual Run"}
    - zone_id: 5
      relay: relay_5
      button: {id: zone_5_manual_button, name: "Zone 5 Manual Run"}
    - zone_id: 6
      relay: relay_6
      button: {id: zone_6_manual_button, name: "Zone 6 Manual Run"}
    - zone_id: 7
      relay: relay_7
      button: {id: zone_7_manual_button, name: "Zone 7 Manual Run"}
    - zone_id: 8
      relay: relay_8
      button: {id: zone_8_manual_button, name: "Zone 8 Manual Run"}
  # OPTIONAL WEATHER INPUTS
  # Add only the Home Assistant sources this installation actually has. Each
  # configured source gets its own protection toggle in the Web UI; omitted
  # sources and their schedule fields stay hidden. Delete any entry below to
  # disable that feature entirely. An empty `weather: {}` is also valid.
  #
  # Every entity must have a numeric state in the unit documented below. The
  # controller reads only the number: it does not inspect HA unit metadata and
  # does not convert mph, m/s, inches, or Fahrenheit. If the source uses a
  # different unit, create a converted HA template sensor and reference it.
  # A missing, non-numeric, or more-than-30-minute-old value is ignored only by
  # the protection that depends on it; it does not stop other protections.
  weather:
    # Average/current wind speed in km/h. Schedule row limits accept 0-150
    # km/h; 0 means that row has no wind limit.
    wind:
      id: weather_wind_speed
      entity_id: sensor.gw1100a_wind_speed
    # Wind gust speed in km/h. Schedule row limits accept 0-150 km/h; 0 means
    # that row has no gust limit.
    gust:
      id: weather_wind_gust
      entity_id: sensor.gw1100a_wind_gust
    # Accumulated rain over the preceding 24 hours in millimetres. Row rain
    # targets accept 0-100 mm; 0 disables rain adjustment for that row. At or
    # above the target the row is skipped; partial rain shortens its duration.
    rain_24h:
      id: weather_rain_24h
      entity_id: sensor.gw1100a_24h_rain
    # Current rain rate in millimetres per hour. Any value greater than 0 is
    # treated as active rain and may wait/skip according to max weather wait.
    rain_rate:
      id: weather_rain_rate
      entity_id: sensor.gw1100a_rain_rate
    # Daily average temperature in degrees Celsius. Schedule base temperature
    # accepts -20 to 60 C and adjustment accepts -20 to 20 percent per C.
    temperature:
      id: weather_daily_avg_temp
      entity_id: sensor.gw1100a_irrigation_daily_average_temperature
  status_text: irrigation_state
  decision_text: irrigation_status_reason
  remaining_sensor: active_row_remaining
  timezone_select: controller_timezone
  selected_enabled_switch: selected_schedule_enabled
  manual_duration: manual_run_duration_min

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

packages:
  sprinkler_core: !include ../packages/sprinkler-core.yaml
