# Copy to local.yaml and adapt these installation-specific example values.
# local.yaml is ignored by Git.
device_name: "sprinkler-controller"
friendly_name: "Sprinkler Controller"
static_ip: "192.168.1.50"
gateway: "192.168.1.1"
subnet: "255.255.255.0"
dns1: "192.168.1.1"
dns2: "1.1.1.1"

# The timezone must be one of the options listed in packages/runtime.yaml.
timezone: "Europe/Budapest"

# Decimal degrees used for local sunrise/sunset calculations.
latitude: "47.4979"
longitude: "19.0402"

# Default for Home Assistant's persistent quick-manual duration control.
manual_run_duration_min: "2"
