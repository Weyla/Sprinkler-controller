# Complete ESPHome Device Builder example for an eight-output Dingtian-style
# board. Before installing:
# 1. Add every !secret key below to Device Builder's secrets.yaml.
# 2. Change identity, location, network, board, and relay hardware as needed.
# 3. Confirm the five Dingtian control pins and all eight output numbers.
# 4. Keep each relay switch paired with the same zone entry.

substitutions:
  # Keep both Git users on the same ref. Release tags are recommended for an
  # installed controller. Use master only for the latest published code.
  sprinkler_repository: https://github.com/Weyla/Sprinkler-controller
  sprinkler_version: v1.0.0
  # CHANGE: device identity and physical location.
  device_name: sprinkler-controller
  friendly_name: Sprinkler Controller
  timezone: Europe/Budapest
  latitude: "47.4979"
  longitude: "19.0402"
  manual_run_duration_min: "2"

packages:
  # Reusable scheduler/runtime behavior. Normally change only the version above.
  sprinkler_core:
    url: ${sprinkler_repository}
    ref: ${sprinkler_version}
    files:
      - packages/sprinkler-core.yaml
    refresh: 1d

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  # CHANGE if this is not a classic ESP32 development/Dingtian board.
  board: esp32dev
  variant: ESP32
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "20"

external_components:
  # Dingtian hardware needs all three components. Keep the ref aligned with the
  # package through sprinkler_version.
  - source:
      type: git
      url: ${sprinkler_repository}
      ref: ${sprinkler_version}
      path: components
    components:
      - dtr0xx_io
      - dynamic_sprinkler
      - web_server_idf
    refresh: 1d

logger:
  # Keep serial logging during first installation and troubleshooting.
  baud_rate: 115200
  level: INFO

api:
  id: ha_api
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  # CHANGE: either adapt this static IP block to the LAN or remove manual_ip to
  # use DHCP. Do not reuse the example address without checking it is free.
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  power_save_mode: none
  fast_connect: false
  manual_ip:
    static_ip: 192.168.1.50
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 1.1.1.1

time:
  # Sunrise/sunset schedules require valid local time and coordinates.
  - platform: sntp
    id: sprinkler_time
    timezone: ${timezone}

sun:
  id: sprinkler_sun
  time_id: sprinkler_time
  latitude: ${latitude}
  longitude: ${longitude}

web_server:
  # The web interface uses HTTP Basic Authentication on the trusted local LAN.
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

dtr0xx_io:
  # CHANGE only after checking the board schematic/pinout. sr_count is the
  # number of physically chained eight-bit registers, not the desired zones.
  - id: dtr0xx_io_hub
    sr_count: 1
    dingtian_clk_pin: 14
    dingtian_q7_pin: 16
    dingtian_sdi_pin: 13
    dingtian_pl_pin: 32
    dingtian_rck_pin: 15

switch:
  # Each valve must be an internal switch that restores OFF. `number` is the
  # Dingtian shift-register output, not an ESP32 GPIO number.
  - platform: gpio
    id: relay_1
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 7, inverted: false}
  - platform: gpio
    id: relay_2
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 6, inverted: false}
  - platform: gpio
    id: relay_3
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 5, inverted: false}
  - platform: gpio
    id: relay_4
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 4, inverted: false}
  - platform: gpio
    id: relay_5
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 3, inverted: false}
  - platform: gpio
    id: relay_6
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 2, inverted: false}
  - platform: gpio
    id: relay_7
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 1, inverted: false}
  - platform: gpio
    id: relay_8
    internal: true
    restore_mode: ALWAYS_OFF
    pin: {dtr0xx_io: dtr0xx_io_hub, number: 0, inverted: false}

dynamic_sprinkler:
  id: dynamic_scheduler
  time_id: sprinkler_time
  sun_id: sprinkler_sun
  zones:
    # CHANGE: remove unused relay/zone pairs or add matching pairs. Keep zone_id
    # permanent; schedules store this ID even if list order or names change.
    - zone_id: 1
      relay: relay_1
      button: {id: zone_1_manual_button, name: "Zone 1 Manual Run"}
    - zone_id: 2
      relay: relay_2
      button: {id: zone_2_manual_button, name: "Zone 2 Manual Run"}
    - zone_id: 3
      relay: relay_3
      button: {id: zone_3_manual_button, name: "Zone 3 Manual Run"}
    - zone_id: 4
      relay: relay_4
      button: {id: zone_4_manual_button, name: "Zone 4 Manual Run"}
    - zone_id: 5
      relay: relay_5
      button: {id: zone_5_manual_button, name: "Zone 5 Manual Run"}
    - zone_id: 6
      relay: relay_6
      button: {id: zone_6_manual_button, name: "Zone 6 Manual Run"}
    - zone_id: 7
      relay: relay_7
      button: {id: zone_7_manual_button, name: "Zone 7 Manual Run"}
    - zone_id: 8
      relay: relay_8
      button: {id: zone_8_manual_button, name: "Zone 8 Manual Run"}
  # OPTIONAL WEATHER INPUTS
  # Keep `weather: {}` when no Home Assistant weather sensors are available.
  # Otherwise replace it with any subset of the commented example below. Values
  # must already use these units; the controller does not convert them.
  #
  # weather:
  #   wind:                         # km/h
  #     id: weather_wind_speed
  #     entity_id: sensor.weather_wind_speed
  #   gust:                         # km/h
  #     id: weather_wind_gust
  #     entity_id: sensor.weather_wind_gust
  #   rain_24h:                     # mm accumulated over the last 24 hours
  #     id: weather_rain_24h
  #     entity_id: sensor.weather_rain_last_24h
  #   rain_rate:                    # mm/h; greater than zero means active rain
  #     id: weather_rain_rate
  #     entity_id: sensor.weather_rain_rate
  #   temperature:                  # degrees Celsius, daily average
  #     id: weather_daily_temperature
  #     entity_id: sensor.weather_daily_average_temperature
  weather: {}
  status_text: irrigation_state
  decision_text: irrigation_status_reason
  remaining_sensor: active_row_remaining
  timezone_select: controller_timezone
  selected_enabled_switch: selected_schedule_enabled
  manual_duration: manual_run_duration_min
