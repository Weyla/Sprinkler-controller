# Complete two-zone example for ordinary active-high GPIO relay modules. Before
# installing:
# 1. Add every !secret key below to Device Builder's secrets.yaml.
# 2. Change identity, location, network, board, relay GPIOs, and active levels.
# 3. Keep each relay switch paired with the same zone entry.
# Test with valves and pumps disconnected.

substitutions:
  # Keep both Git users on the same ref. Release tags are recommended for an
  # installed controller. Use master only for the latest published code.
  sprinkler_repository: https://github.com/Weyla/Sprinkler-controller
  sprinkler_version: v1.1.0
  # CHANGE: device identity and physical location.
  device_name: sprinkler-controller
  friendly_name: Sprinkler Controller
  timezone: Europe/Budapest
  latitude: "47.4979"
  longitude: "19.0402"
  manual_run_duration_min: "2"

packages:
  # Reusable scheduler/runtime behavior. Normally change only the version above.
  sprinkler_core:
    url: ${sprinkler_repository}
    ref: ${sprinkler_version}
    files:
      - packages/sprinkler-core.yaml
    refresh: 1d

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  # CHANGE the board/variant when using another ESP32 model.
  board: esp32dev
  variant: ESP32
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_LWIP_MAX_SOCKETS: "20"

external_components:
  # Generic relay installations do not need dtr0xx_io. Keep these two entries
  # and the ref aligned with the package through sprinkler_version.
  - source:
      type: git
      url: ${sprinkler_repository}
      ref: ${sprinkler_version}
      path: components
    components:
      - dynamic_sprinkler
      - web_server_idf
    refresh: 1d

logger:
  # Keep serial logging during first installation and troubleshooting.
  baud_rate: 115200
  level: INFO

api:
  id: ha_api
  encryption:
    key: !secret api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  # Wi-Fi uses DHCP in this example. Add a valid manual_ip block here only when
  # the installation needs a static address.
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  power_save_mode: none
  fast_connect: false

time:
  # Sunrise/sunset schedules require valid local time and coordinates.
  - platform: sntp
    id: sprinkler_time
    timezone: ${timezone}

sun:
  id: sprinkler_sun
  time_id: sprinkler_time
  latitude: ${latitude}
  longitude: ${longitude}

web_server:
  # The web interface uses HTTP Basic Authentication on the trusted local LAN.
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

switch:
  # CHANGE GPIO numbers and `inverted` for the relay module. Every valve must be
  # internal and restore OFF. Add/remove relay blocks together with zones below.
  - platform: gpio
    id: relay_1
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      number: GPIO16
      inverted: false
  - platform: gpio
    id: relay_2
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      number: GPIO17
      inverted: false

dynamic_sprinkler:
  id: dynamic_scheduler
  time_id: sprinkler_time
  sun_id: sprinkler_sun
  zones:
    # Keep zone_id permanent; schedules store this ID even if list order or
    # names change. Every zone needs one relay and one unique button id.
    - zone_id: 1
      relay: relay_1
      name: Front Lawn
      button: {id: zone_1_manual_button, name: "Front Lawn Manual Run"}
    - zone_id: 2
      relay: relay_2
      name: Back Lawn
      button: {id: zone_2_manual_button, name: "Back Lawn Manual Run"}
  # OPTIONAL WEATHER INPUTS
  # Keep `weather: {}` when no Home Assistant weather sensors are available.
  # Otherwise replace it with any subset of the commented example below. Values
  # must already use these units; the controller does not convert them.
  #
  # weather:
  #   wind:                         # km/h
  #     id: weather_wind_speed
  #     entity_id: sensor.weather_wind_speed
  #   gust:                         # km/h
  #     id: weather_wind_gust
  #     entity_id: sensor.weather_wind_gust
  #   rain_24h:                     # mm accumulated over the last 24 hours
  #     id: weather_rain_24h
  #     entity_id: sensor.weather_rain_last_24h
  #   rain_rate:                    # mm/h; greater than zero means active rain
  #     id: weather_rain_rate
  #     entity_id: sensor.weather_rain_rate
  #   temperature:                  # degrees Celsius, daily average
  #     id: weather_daily_temperature
  #     entity_id: sensor.weather_daily_average_temperature
  weather: {}
  status_text: irrigation_state
  decision_text: irrigation_status_reason
  remaining_sensor: active_row_remaining
  timezone_select: controller_timezone
  selected_enabled_switch: selected_schedule_enabled
  manual_duration: manual_run_duration_min
