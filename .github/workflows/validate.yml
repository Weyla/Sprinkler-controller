name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  esphome:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install tools
        run: python -m pip install -r requirements.txt
      - name: Create example secrets
        run: |
          cp examples/secrets.example.yaml examples/secrets.yaml
          cp examples/secrets.example.yaml development/secrets.yaml
          cp development/local.example.yaml development/local.yaml
      - name: Validate JavaScript
        run: |
          node --check web/dynamic_app.js
          node --test tests/*.test.cjs
      - name: Validate ESPHome configuration
        run: |
          esphome config development/sprinkler-test.yaml
          esphome \
            -s sprinkler_repository "file://${GITHUB_WORKSPACE}" \
            -s sprinkler_version "${GITHUB_SHA}" \
            config examples/dingtian-8-zone.yaml
          esphome \
            -s sprinkler_repository "file://${GITHUB_WORKSPACE}" \
            -s sprinkler_version "${GITHUB_SHA}" \
            config examples/gpio-relays.yaml
      - name: Compile firmware
        run: esphome compile development/sprinkler-test.yaml
